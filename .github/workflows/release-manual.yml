name: Release (manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version without v prefix (e.g. 1.2.5)"
        required: true
        type: string
      notes:
        description: "Optional release notes (markdown). Leave empty to auto-generate from merged PRs/commits."
        required: false
        type: string
      append_install_section:
        description: "Append standard HACS install section to release notes"
        required: false
        type: boolean
        default: true

permissions: {}

jobs:
  release:
    name: Bump manifest, tag, and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main

      - name: Validate version and bump manifest
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          TAG="v${VERSION}"
          MANIFEST="custom_components/eurevia_regate_rsmart/manifest.json"

          python3 - "${VERSION}" "${MANIFEST}" <<'PY'
          import json
          import re
          import sys
          from pathlib import Path

          version, manifest_path = sys.argv[1], Path(sys.argv[2])
          if not re.fullmatch(r"\d+\.\d+\.\d+", version):
              raise SystemExit(f"Invalid semver: {version!r} (expected MAJOR.MINOR.PATCH)")

          data = json.loads(manifest_path.read_text(encoding="utf-8"))
          current = str(data.get("version", ""))
          if current == version:
              print(f"Manifest already at {version}")
          else:

              def parse(value: str) -> tuple[int, ...]:
                  return tuple(int(part) for part in value.split("."))

              if parse(version) < parse(current):
                  raise SystemExit(
                      f"Refusing to downgrade manifest {current!r} -> {version!r}"
                  )
              data["version"] = version
              manifest_path.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
              print(f"Bumped manifest {current!r} -> {version!r}")
          PY

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists"
            exit 1
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Commit manifest bump
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components/eurevia_regate_rsmart/manifest.json
          if git diff --staged --quiet; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            echo "No manifest change — releasing current main HEAD."
          else
            git commit -m "chore(release): bump manifest to ${{ steps.meta.outputs.version }}"
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Push manifest bump to main
        if: steps.commit.outputs.changed == 'true'
        run: git push origin main

      - name: Resolve previous tag
        id: prev
        shell: bash
        run: |
          set -euo pipefail
          PREV=$(git tag -l "v*" --sort=-v:refname | grep -v "^${{ steps.meta.outputs.tag }}$" | head -1 || true)
          echo "tag=${PREV}" >> "${GITHUB_OUTPUT}"

      - name: Build release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
          CUSTOM_NOTES: ${{ inputs.notes }}
        shell: bash
        run: |
          set -euo pipefail
          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"
          TAG="${{ steps.meta.outputs.tag }}"
          PREV="${{ steps.prev.outputs.tag }}"

          if [ -n "${CUSTOM_NOTES}" ]; then
            printf '%s\n' "${CUSTOM_NOTES}" > "${NOTES_FILE}"
          else
            ARGS=(repos/${{ github.repository }}/releases/generate-notes -f "tag_name=${TAG}" -f target_commitish=main)
            if [ -n "${PREV}" ]; then
              ARGS+=(-f "previous_tag_name=${PREV}")
            fi
            BODY=$(gh api "${ARGS[@]}" --jq .body)
            if [ -z "${BODY}" ] || [ "${BODY}" = "null" ]; then
              if [ -n "${PREV}" ]; then
                RANGE="${PREV}..HEAD"
              else
                RANGE="HEAD"
              fi
              {
                echo "## Changes"
                echo
                git log ${RANGE} --pretty=format:'- %s (%h)' --no-merges
              } > "${NOTES_FILE}"
            else
              printf '%s\n' "${BODY}" > "${NOTES_FILE}"
            fi
          fi

          if [ "${{ inputs.append_install_section }}" = "true" ]; then
            {
              echo
              echo "## Install"
              echo
              echo "HACS custom repository or download \`eurevia_regate_rsmart.zip\` from this release into \`config/custom_components/\`."
              echo
              echo "After update: **Settings → Devices & services → Eurevia reGATE → Reload**."
            } >> "${NOTES_FILE}"
          fi

          echo "path=${NOTES_FILE}" >> "${GITHUB_OUTPUT}"
          echo "--- Release notes preview ---"
          cat "${NOTES_FILE}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${{ steps.meta.outputs.tag }}" \
            --target main \
            --title "${{ steps.meta.outputs.tag }}" \
            --notes-file "${{ steps.notes.outputs.path }}"
